# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "pt-BR"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: true
  abort_on_close: true
  disable_cache: false
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 5
    drafts: false
    base_branches:
      - "main"
  path_filters:
    - "src/**"
    - "__tests__/**"
    - "docs/design/**"
    - "docs/superpowers/specs/**"
    - "README.md"
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".env.example"
    - "package.json"
    - "tsconfig.json"
    - "next.config.ts"
    - "postcss.config.mjs"
    - "vercel.json"
    - "!node_modules/**"
    - "!.next/**"
    - "!public/**"
    - "!package-lock.json"
    - "!docs/superpowers/plans/**"
    - "!**/*.png"
    - "!**/*.ico"
    - "!**/*.svg"
  path_instructions:
    - path: "src/app/**/*.tsx"
      instructions: >
        Revise com foco em App Router do Next.js 16, server/client component boundaries,
        metadata, acessibilidade, estados de erro e regressões reais de UX.
        Evite nitpicks de formatação ou preferências sem impacto funcional.
    - path: "src/app/mapa-astral/**"
      instructions: >
        Preserve a linguagem NeoBrutalist do projeto. Priorize bugs reais em cálculo,
        geocode, acessibilidade, hidratação e DOM client-side do astrochart. Não sugerir
        suavização visual, sombras difusas ou bordas de baixo contraste.
    - path: "src/components/**/*.tsx"
      instructions: >
        Priorize regressões de comportamento, acessibilidade, foco, semântica e coerência
        com o design system. Evite comentários cosméticos sobre classes Tailwind quando
        não houver risco real.
    - path: "__tests__/**/*"
      instructions: >
        Prefira sugestões que aumentem confiabilidade e clareza sem acoplar o teste a
        detalhes frágeis de implementação. Evite pedir snapshots ou asserts excessivamente
        genéricos.
    - path: "docs/design/**"
      instructions: >
        Trate estes arquivos como fonte de verdade para o design system. Sinalize apenas
        contradições, links quebrados, metadata inválida ou instruções que conflitem com
        o código atual.

chat:
  auto_reply: true

tools:
  markdownlint:
    enabled: true
  yamllint:
    enabled: true
  gitleaks:
    enabled: true
  dotenvLint:
    enabled: true
  htmlhint:
    enabled: false
  eslint:
    enabled: false
